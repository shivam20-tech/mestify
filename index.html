<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="description"
    content="Mestify – Smart music streaming. Mood-matched songs, zero ads, background playback." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no">
  <title>Mestify – Music for Everyone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23ff0040'/%3E%3Ctext x='32' y='46' text-anchor='middle' font-size='36'%3E%F0%9F%8E%B5%3C/text%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.15/dist/hls.min.js"></script>

  <style>
    /* ────────── DESIGN TOKENS ────────── */
    :root {
      --bg: #0f0f0f;
      --surface: #161616;
      --card: #1e1e1e;
      --border: #272727;
      --accent: #ff0040;
      --accent2: #ff6b6b;
      --accent3: #43e97b;
      --text: #f1f1f1;
      --muted: #717171;
      --player-h: 80px;
      --sidebar-w: 240px;
      --radius: 12px;
      --mob-nav-h: 60px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;

      /* Animation easing curves */
      --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
      --ease-out: cubic-bezier(0, 0, 0.2, 1);
      --ease-in-out: cubic-bezier(0.4, 0, 0.6, 1);
      --ease-bounce: cubic-bezier(0.68, -0.55, 0.265, 1.55);

      /* Durations */
      --dur-fast: 150ms;
      --dur-normal: 260ms;
      --dur-slow: 400ms;
      --dur-page: 320ms;
    }

    /* ────────── RESET & BASE ────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: grid;
      grid-template-rows: 1fr var(--player-h);
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-areas: "sidebar main" "player player";
    }

    /* ────────── SCROLLBAR ────────── */
    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3a3a3a;
      border-radius: 9px;
      transition: background 0.2s;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    /* ════════════════════════════════════
       GLOBAL ANIMATION KEYFRAMES
    ════════════════════════════════════ */

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(16px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-24px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(24px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.92);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0;
      }

      100% {
        background-position: -200% 0;
      }
    }

    @keyframes hero-shift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    @keyframes eq-bounce {
      from {
        transform: scaleY(0.25);
      }

      to {
        transform: scaleY(1);
      }
    }

    @keyframes vinyl-spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    @keyframes thumb-pulse {

      0%,
      100% {
        box-shadow: 0 0 0 0 rgba(255, 0, 64, .4);
      }

      50% {
        box-shadow: 0 0 0 8px rgba(255, 0, 64, 0);
      }
    }

    @keyframes player-glow {
      from {
        opacity: 0.4;
      }

      to {
        opacity: 0.9;
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes cardEntrance {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.94);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes rowEntrance {
      from {
        opacity: 0;
        transform: translateX(-16px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes toastIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes toastOut {
      from {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateY(8px) scale(0.96);
      }
    }

    @keyframes ripple {
      from {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0.4;
      }

      to {
        transform: translate(-50%, -50%) scale(2.5);
        opacity: 0;
      }
    }

    @keyframes nowPlayingPop {
      0% {
        transform: scale(1);
      }

      40% {
        transform: scale(1.06);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes likeHeart {
      0% {
        transform: scale(1);
      }

      30% {
        transform: scale(1.4);
      }

      60% {
        transform: scale(0.9);
      }

      100% {
        transform: scale(1);
      }
    }

    @keyframes slideUpPage {
      from {
        opacity: 0;
        transform: translateY(28px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideLeftPage {
      from {
        opacity: 0;
        transform: translateX(32px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes queueSlideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    @keyframes queueSlideOut {
      from {
        transform: translateX(0);
        opacity: 1;
      }

      to {
        transform: translateX(100%);
        opacity: 0;
      }
    }

    @keyframes expandedSlideUp {
      from {
        transform: translateY(100%);
        opacity: 0;
      }

      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @keyframes expandedSlideDown {
      from {
        transform: translateY(0);
        opacity: 1;
      }

      to {
        transform: translateY(100%);
        opacity: 0;
      }
    }

    @keyframes modalScaleIn {
      from {
        opacity: 0;
        transform: scale(0.88) translateY(16px);
      }

      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes suggestionDrop {
      from {
        opacity: 0;
        transform: translateY(-8px) scaleY(0.9);
        transform-origin: top;
      }

      to {
        opacity: 1;
        transform: translateY(0) scaleY(1);
        transform-origin: top;
      }
    }

    @keyframes sidebarItemIn {
      from {
        opacity: 0;
        transform: translateX(-12px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes playerTrackIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes progressPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.7;
      }
    }

    /* ════════════════════════════════════
       UTILITY CLASSES
    ════════════════════════════════════ */
    .fade-in {
      animation: fadeInUp var(--dur-slow) var(--ease-out) both;
    }

    .scale-in {
      animation: scaleIn var(--dur-normal) var(--ease-out) both;
    }

    .slide-left {
      animation: slideInLeft var(--dur-normal) var(--ease-out) both;
    }

    .slide-right {
      animation: slideInRight var(--dur-normal) var(--ease-out) both;
    }

    /* Staggered children */
    .stagger-children>*:nth-child(1) {
      animation-delay: 0ms;
    }

    .stagger-children>*:nth-child(2) {
      animation-delay: 40ms;
    }

    .stagger-children>*:nth-child(3) {
      animation-delay: 80ms;
    }

    .stagger-children>*:nth-child(4) {
      animation-delay: 120ms;
    }

    .stagger-children>*:nth-child(5) {
      animation-delay: 160ms;
    }

    .stagger-children>*:nth-child(6) {
      animation-delay: 200ms;
    }

    .stagger-children>*:nth-child(7) {
      animation-delay: 240ms;
    }

    .stagger-children>*:nth-child(8) {
      animation-delay: 280ms;
    }

    /* ════════════════════════════════════
       SHELF & LAYOUT
    ════════════════════════════════════ */
    .shelf {
      margin-bottom: 40px;
    }

    .shelf-row {
      display: flex;
      gap: 14px;
      overflow-x: auto;
      padding-bottom: 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      /* Smooth momentum scrolling */
      overscroll-behavior-x: contain;
    }

    .shelf-row::-webkit-scrollbar {
      height: 3px;
    }

    .shelf-row::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    .shelf-row .song-card {
      flex-shrink: 0;
      width: 160px;
      scroll-snap-align: start;
    }

    /* ════════════════════════════════════
       SIDEBAR
    ════════════════════════════════════ */
    #sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Slide in on load */
      animation: slideInLeft 0.5s var(--ease-out) both;
    }

    .logo {
      padding: 24px 20px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      animation: fadeInDown 0.5s var(--ease-out) 0.1s both;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 16px;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    .logo:hover .logo-icon {
      transform: rotate(-8deg) scale(1.1);
    }

    .logo span {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    nav {
      padding: 8px 12px;
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--muted);
      padding: 14px 8px 6px;
      text-transform: uppercase;
      animation: fadeIn 0.4s var(--ease-out) 0.2s both;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: background var(--dur-fast) var(--ease-smooth),
        color var(--dur-fast) var(--ease-smooth),
        transform var(--dur-fast) var(--ease-smooth);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
      position: relative;
      overflow: hidden;
      animation: sidebarItemIn 0.4s var(--ease-out) both;
    }

    .nav-item:nth-child(1) {
      animation-delay: 0.15s;
    }

    .nav-item:nth-child(2) {
      animation-delay: 0.2s;
    }

    .nav-item:nth-child(3) {
      animation-delay: 0.25s;
    }

    .nav-item:nth-child(4) {
      animation-delay: 0.3s;
    }

    .nav-item i {
      width: 18px;
      text-align: center;
      font-size: 15px;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    .nav-item:hover {
      background: var(--card);
      color: var(--text);
      transform: translateX(3px);
    }

    .nav-item:hover i {
      transform: scale(1.15);
    }

    .nav-item.active {
      background: rgba(255, 0, 64, .12);
      color: var(--accent);
    }

    .nav-item.active i {
      transform: scale(1.1);
    }

    /* Ripple effect on nav items */
    .nav-item .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 0, 64, .15);
      width: 20px;
      height: 20px;
      pointer-events: none;
      animation: ripple 0.5s var(--ease-out) forwards;
    }

    .genre-pills {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      flex: 1;
    }

    .genre-pill {
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      transition: background var(--dur-fast) var(--ease-smooth),
        color var(--dur-fast) var(--ease-smooth),
        transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal) var(--ease-smooth);
      border: none;
      background: none;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: sidebarItemIn 0.4s var(--ease-out) both;
    }

    .genre-pill .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    .genre-pill:hover {
      background: var(--card);
      color: var(--text);
      transform: translateX(4px);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .genre-pill:hover .dot {
      transform: scale(1.4);
    }

    .genre-pill.active {
      background: var(--card);
      color: var(--text);
      box-shadow: inset 0 0 0 1px var(--border);
    }

    .genre-pill.active .dot {
      transform: scale(1.3);
    }

    /* ════════════════════════════════════
       MAIN AREA
    ════════════════════════════════════ */
    #main {
      grid-area: main;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      scroll-behavior: smooth;
    }

    /* ─── TOPBAR ─── */
    #topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(10, 10, 15, .85);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeInDown 0.4s var(--ease-out) 0.05s both;
      transition: background 0.3s;
    }

    #topbar h1 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      flex: 1;
      transition: opacity var(--dur-normal), transform var(--dur-normal) var(--ease-out);
    }

    /* Title change animation */
    #topbar h1.changing {
      opacity: 0;
      transform: translateY(-6px);
    }

    .search-wrap {
      flex: 1;
      max-width: 400px;
      display: flex;
      align-items: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 0 16px;
      gap: 10px;
      transition: border-color var(--dur-normal),
        box-shadow var(--dur-normal),
        transform var(--dur-fast) var(--ease-spring);
      position: relative;
    }

    .search-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255, 0, 64, .1);
      transform: scale(1.01);
    }

    .search-wrap>i {
      color: var(--muted);
      font-size: 14px;
      transition: color var(--dur-normal);
    }

    .search-wrap:focus-within>i {
      color: var(--accent);
    }

    #searchInput {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 0;
      flex: 1;
    }

    #searchInput::placeholder {
      color: var(--muted);
    }

    #searchBtn {
      background: var(--accent);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 12px;
      transition: transform var(--dur-fast) var(--ease-spring), box-shadow var(--dur-normal);
      flex-shrink: 0;
    }

    #searchBtn:hover {
      transform: scale(1.12);
      box-shadow: 0 4px 14px rgba(255, 0, 64, .4);
    }

    #searchBtn:active {
      transform: scale(0.95);
    }

    /* ─── SUGGESTIONS ─── */
    #suggestions {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      left: -16px;
      right: -16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      z-index: 9999;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .7);
      transform-origin: top center;
    }

    #suggestions.open {
      display: block;
      animation: suggestionDrop var(--dur-normal) var(--ease-out) both;
    }

    .suggest-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text);
      transition: background var(--dur-fast), transform var(--dur-fast);
      border-bottom: 1px solid rgba(255, 255, 255, .04);
    }

    .suggest-item:last-child {
      border-bottom: none;
    }

    .suggest-item:hover,
    .suggest-item.active {
      background: rgba(255, 0, 64, .12);
      transform: translateX(4px);
    }

    .suggest-item i {
      color: var(--muted);
      font-size: 12px;
      width: 14px;
      flex-shrink: 0;
    }

    .suggest-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── CONTENT ─── */
    #content {
      padding: 28px;
      flex: 1;
    }

    /* Content page transition wrapper */
    .page-transition {
      animation: slideUpPage var(--dur-page) var(--ease-out) both;
    }

    /* ─── HERO ─── */
    .hero {
      border-radius: 20px;
      padding: 40px;
      background: linear-gradient(135deg,
          rgba(255, 0, 64, .28),
          rgba(120, 0, 255, .18),
          rgba(255, 107, 107, .15),
          rgba(67, 233, 123, .08)) !important;
      background-size: 300% 300% !important;
      animation: hero-shift 8s ease infinite, fadeInUp 0.5s var(--ease-out) both !important;
      border: 1px solid rgba(255, 0, 64, .2);
      margin-bottom: 36px;
      position: relative;
      overflow: hidden;
      transition: transform var(--dur-normal) var(--ease-out), box-shadow var(--dur-normal);
    }

    .hero:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 64px rgba(255, 0, 64, .15);
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 50%, rgba(255, 0, 64, .1) 0%, transparent 70%);
    }

    .hero-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 10px;
      animation: fadeInUp 0.5s var(--ease-out) 0.1s both;
    }

    .hero h2 {
      font-family: var(--font-head);
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 8px;
      animation: fadeInUp 0.5s var(--ease-out) 0.15s both;
    }

    .hero p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 24px;
      animation: fadeInUp 0.5s var(--ease-out) 0.2s both;
    }

    .hero-btns {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      animation: fadeInUp 0.5s var(--ease-out) 0.25s both;
    }

    /* ─── BUTTONS ─── */
    .btn-primary {
      padding: 12px 28px;
      border-radius: 50px;
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal);
      position: relative;
      overflow: hidden;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .12);
      opacity: 0;
      transition: opacity var(--dur-fast);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 0, 64, .4);
    }

    .btn-primary:hover::after {
      opacity: 1;
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.97);
    }

    .btn-ghost {
      padding: 12px 28px;
      border-radius: 50px;
      background: rgba(255, 255, 255, .08);
      color: var(--text);
      border: 1px solid var(--border);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      transition: background var(--dur-normal), transform var(--dur-fast) var(--ease-spring);
    }

    .btn-ghost:hover {
      background: rgba(255, 255, 255, .14);
      transform: translateY(-1px);
    }

    .btn-ghost:active {
      transform: scale(0.97);
    }

    .section {
      margin-bottom: 36px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
    }

    .section-header h3 {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 700;
      flex: 1;
    }

    .see-all {
      font-size: 13px;
      color: var(--accent);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--font-body);
      transition: opacity var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
    }

    .see-all:hover {
      opacity: 0.8;
      transform: translateX(2px);
      text-decoration: underline;
    }

    .btn-play-all {
      padding: 7px 18px;
      border-radius: 50px;
      background: rgba(255, 0, 64, .12);
      color: var(--accent);
      border: 1px solid rgba(255, 0, 64, .3);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background var(--dur-normal),
        transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal);
      white-space: nowrap;
    }

    .btn-play-all i {
      font-size: 10px;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    .btn-play-all:hover {
      background: rgba(255, 0, 64, .22);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 0, 64, .2);
    }

    .btn-play-all:hover i {
      transform: scale(1.3);
    }

    .btn-play-all:active {
      transform: scale(0.95);
    }

    /* ════════════════════════════════════
       SONG CARDS
    ════════════════════════════════════ */
    .song-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 16px;
    }

    .song-card {
      background: var(--card);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: transform var(--dur-normal) var(--ease-spring),
        box-shadow var(--dur-normal),
        border-color var(--dur-fast);
      border: 1px solid transparent;
      position: relative;
      /* Staggered card entrance */
      animation: cardEntrance var(--dur-slow) var(--ease-out) both;
      will-change: transform;
    }

    .song-card:nth-child(1) {
      animation-delay: 0ms;
    }

    .song-card:nth-child(2) {
      animation-delay: 40ms;
    }

    .song-card:nth-child(3) {
      animation-delay: 80ms;
    }

    .song-card:nth-child(4) {
      animation-delay: 120ms;
    }

    .song-card:nth-child(5) {
      animation-delay: 160ms;
    }

    .song-card:nth-child(6) {
      animation-delay: 200ms;
    }

    .song-card:nth-child(7) {
      animation-delay: 240ms;
    }

    .song-card:nth-child(8) {
      animation-delay: 280ms;
    }

    .song-card:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 16px 40px rgba(0, 0, 0, .5);
      border-color: var(--border);
    }

    .song-card:active {
      transform: translateY(-2px) scale(0.99);
    }

    .song-card.playing {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent), 0 8px 24px rgba(255, 0, 64, .2);
      animation: nowPlayingPop 0.4s var(--ease-spring) both;
    }

    .card-thumb {
      width: 100%;
      aspect-ratio: 1;
      position: relative;
      overflow: hidden;
      background: var(--border);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s var(--ease-smooth);
      will-change: transform;
    }

    .song-card:hover .card-thumb img {
      transform: scale(1.08);
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: grid;
      place-items: center;
      opacity: 0;
      transition: opacity var(--dur-normal);
      backdrop-filter: blur(2px);
    }

    .song-card:hover .card-overlay {
      opacity: 1;
    }

    .song-card.playing .card-overlay {
      opacity: 1;
      background: rgba(255, 0, 64, .2);
    }

    .play-btn-card {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 16px;
      transition: transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal);
      box-shadow: 0 4px 16px rgba(0, 0, 0, .4);
      /* Enters from below */
      transform: translateY(8px);
    }

    .song-card:hover .play-btn-card {
      transform: translateY(0) scale(1);
    }

    .play-btn-card:hover {
      transform: scale(1.12) !important;
      box-shadow: 0 8px 24px rgba(255, 0, 64, .5);
    }

    .play-btn-card:active {
      transform: scale(0.9) !important;
    }

    .card-info {
      padding: 12px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
      transition: color var(--dur-fast);
    }

    .song-card:hover .card-title {
      color: var(--accent);
    }

    .card-artist {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ════════════════════════════════════
       SONG ROWS
    ════════════════════════════════════ */
    .song-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .song-row {
      display: grid;
      grid-template-columns: 28px 48px 1fr auto;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background var(--dur-fast),
        transform var(--dur-fast) var(--ease-spring);
      border: 1px solid transparent;
      animation: rowEntrance var(--dur-normal) var(--ease-out) both;
      will-change: transform;
    }

    .song-row:nth-child(1) {
      animation-delay: 0ms;
    }

    .song-row:nth-child(2) {
      animation-delay: 30ms;
    }

    .song-row:nth-child(3) {
      animation-delay: 60ms;
    }

    .song-row:nth-child(4) {
      animation-delay: 90ms;
    }

    .song-row:nth-child(5) {
      animation-delay: 120ms;
    }

    .song-row:nth-child(6) {
      animation-delay: 150ms;
    }

    .song-row:nth-child(7) {
      animation-delay: 180ms;
    }

    .song-row:nth-child(8) {
      animation-delay: 210ms;
    }

    .song-row:nth-child(9) {
      animation-delay: 240ms;
    }

    .song-row:nth-child(10) {
      animation-delay: 270ms;
    }

    .song-row:hover {
      background: var(--card);
      transform: translateX(4px);
    }

    .song-row:active {
      transform: translateX(2px) scale(0.99);
    }

    .song-row.playing {
      background: rgba(255, 0, 64, .1);
      border-color: rgba(255, 0, 64, .2);
      animation: rowEntrance var(--dur-normal) var(--ease-out) both;
    }

    .song-row-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    .song-row:hover .song-row-thumb {
      transform: scale(1.05) rotate(-1deg);
    }

    .song-row-info h4 {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .song-row-info p {
      font-size: 12px;
      color: var(--muted);
    }

    .song-row-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color var(--dur-fast),
        background var(--dur-fast),
        transform var(--dur-fast) var(--ease-spring);
      font-size: 14px;
    }

    .icon-btn:hover {
      color: var(--text);
      background: var(--border);
      transform: scale(1.15);
    }

    .icon-btn:active {
      transform: scale(0.9);
    }

    .icon-btn.liked {
      color: var(--accent2);
    }

    /* ════════════════════════════════════
       SKELETON LOADERS
    ════════════════════════════════════ */
    .skeleton {
      background: linear-gradient(90deg, var(--card) 25%, var(--border) 50%, var(--card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    .skeleton-card {
      height: 200px;
      border-radius: var(--radius);
    }

    .skeleton-row {
      height: 68px;
      border-radius: 10px;
      margin-bottom: 4px;
    }

    /* ─── EMPTY STATE ─── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      animation: fadeInUp 0.5s var(--ease-out) both;
    }

    .empty-state i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: .4;
      display: block;
    }

    .empty-state h3 {
      font-family: var(--font-head);
      font-size: 20px;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ════════════════════════════════════
       PLAYER BAR
    ════════════════════════════════════ */
    #player {
      grid-area: player;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      align-items: center;
      padding: 0 24px;
      gap: 16px;
      position: relative;
      z-index: 100;
      min-height: var(--player-h);
      animation: fadeInDown 0.5s var(--ease-out) 0.2s both;
    }

    #player::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.5;
      transition: opacity 0.3s;
    }

    #player.is-playing::before {
      opacity: 1 !important;
      animation: player-glow 2s ease-in-out infinite alternate;
    }

    /* ─── NOW PLAYING ─── */
    .now-playing {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .np-thumb {
      width: 52px;
      height: 52px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--border);
      transition: border-color 0.3s, border-radius 0.4s var(--ease-smooth);
      cursor: pointer;
    }

    .np-thumb.playing-spin {
      animation: vinyl-spin 8s linear infinite !important;
      border-radius: 50% !important;
      box-shadow: 0 0 0 3px rgba(255, 0, 64, .5), 0 0 24px rgba(255, 0, 64, .3);
    }

    .np-info h4 {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
      transition: color var(--dur-normal);
    }

    .np-info p {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }

    /* Track change animation on player */
    .np-info.track-change h4,
    .np-info.track-change p {
      animation: playerTrackIn 0.35s var(--ease-out) both;
    }

    .np-like {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      transition: color var(--dur-normal), transform var(--dur-fast) var(--ease-spring);
      padding: 4px;
    }

    .np-like:hover {
      transform: scale(1.2);
    }

    .np-like.liked {
      color: var(--accent2);
    }

    .np-like.like-animate {
      animation: likeHeart 0.4s var(--ease-spring) both;
    }

    /* ─── CONTROLS ─── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .ctrl-btns {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      transition: color var(--dur-fast),
        transform var(--dur-fast) var(--ease-spring);
      padding: 4px;
    }

    .ctrl-btn:hover {
      color: var(--text);
      transform: scale(1.15);
    }

    .ctrl-btn:active {
      transform: scale(0.9);
    }

    .ctrl-btn.active {
      color: var(--accent);
    }

    #playBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      display: grid;
      place-items: center;
      cursor: pointer;
      font-size: 16px;
      transition: transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal);
    }

    #playBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 4px 20px rgba(255, 0, 64, .5);
    }

    #playBtn:active {
      transform: scale(0.92);
    }

    /* ─── PROGRESS ─── */
    .progress-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time {
      font-size: 11px;
      color: var(--muted);
      min-width: 32px;
      text-align: center;
    }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: height var(--dur-fast) var(--ease-smooth);
    }

    .progress-bar:hover {
      height: 6px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      pointer-events: none;
      transition: width 0.5s linear;
    }

    .progress-bar:hover .progress-fill {
      transition: none;
    }

    /* Instant on drag */

    .progress-thumb {
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      opacity: 0;
      transition: opacity var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
      pointer-events: none;
      box-shadow: 0 2px 6px rgba(0, 0, 0, .3);
    }

    .progress-bar:hover .progress-thumb {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.2);
    }

    /* ─── RIGHT CONTROLS ─── */
    .right-ctrl {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: flex-end;
    }

    .vol-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .vol-bar {
      width: 80px;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      cursor: pointer;
      transition: height var(--dur-fast);
      position: relative;
    }

    .vol-bar:hover {
      height: 6px;
    }

    .vol-fill {
      height: 100%;
      background: var(--muted);
      border-radius: 4px;
      pointer-events: none;
      transition: background var(--dur-normal), width 0.1s;
    }

    .vol-bar:hover .vol-fill {
      background: var(--text);
    }

    #sleepBadge {
      display: none;
      background: rgba(255, 0, 64, .15);
      color: var(--accent);
      border: 1px solid rgba(255, 0, 64, .3);
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 600;
    }

    #sleepBadge.active {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      animation: scaleIn var(--dur-normal) var(--ease-spring) both;
    }

    /* ════════════════════════════════════
       QUEUE PANEL — Slide animation
    ════════════════════════════════════ */
    #queuePanel {
      position: fixed;
      right: 0;
      top: 0;
      bottom: var(--player-h);
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      opacity: 0;
      transition: transform 0.35s var(--ease-smooth),
        opacity 0.35s var(--ease-smooth);
      will-change: transform;
    }

    #queuePanel.open {
      transform: translateX(0);
      opacity: 1;
    }

    .queue-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .queue-header h3 {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700;
    }

    .queue-items {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--dur-fast),
        transform var(--dur-fast) var(--ease-spring);
      animation: fadeInUp 0.3s var(--ease-out) both;
    }

    .queue-item:hover {
      background: var(--card);
      transform: translateX(4px);
    }

    .queue-item:active {
      transform: translateX(2px) scale(0.99);
    }

    .queue-item.active {
      background: rgba(255, 0, 64, .1);
    }

    .queue-item img {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    .queue-item:hover img {
      transform: scale(1.05);
    }

    .queue-item-info {
      flex: 1;
      min-width: 0;
    }

    .queue-item-info h5 {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .queue-item-info p {
      font-size: 11px;
      color: var(--muted);
    }

    /* ════════════════════════════════════
       SLEEP TIMER MODAL
    ════════════════════════════════════ */
    #sleepModal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .72);
      backdrop-filter: blur(10px);
      z-index: 500;
      place-items: center;
    }

    #sleepModal.open {
      display: grid;
      animation: fadeIn 0.25s var(--ease-out) both;
    }

    #sleepModal.open .sleep-card {
      animation: modalScaleIn var(--dur-normal) var(--ease-spring) both;
    }

    .sleep-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      width: 320px;
    }

    .sleep-card h3 {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .sleep-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .sleep-opt {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      transition: border-color var(--dur-fast), color var(--dur-fast),
        transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal);
      text-align: center;
    }

    .sleep-opt:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 0, 64, .15);
    }

    .sleep-opt:active {
      transform: scale(0.96);
    }

    .sleep-cancel {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      transition: background var(--dur-fast), color var(--dur-fast), transform var(--dur-fast);
    }

    .sleep-cancel:hover {
      background: var(--card);
      color: var(--text);
    }

    .sleep-cancel:active {
      transform: scale(0.98);
    }

    /* ════════════════════════════════════
       TOAST — Smooth in/out
    ════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: calc(var(--player-h) + 16px);
      right: 20px;
      background: rgba(30, 30, 30, .95);
      border: 1px solid var(--border);
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      z-index: 500;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, .4);
      transition: none;
    }

    #toast.show {
      animation: toastIn 0.28s var(--ease-spring) both;
      opacity: 1;
    }

    #toast.hide {
      animation: toastOut 0.22s var(--ease-smooth) both;
    }

    /* ════════════════════════════════════
       EQ BARS
    ════════════════════════════════════ */
    .eq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 16px;
      position: absolute;
      bottom: 8px;
      left: 8px;
    }

    .eq-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--accent);
      animation: eq-bounce 0.8s ease-in-out infinite alternate;
    }

    .eq-bar:nth-child(1) {
      height: 6px;
      animation-delay: 0s;
    }

    .eq-bar:nth-child(2) {
      height: 12px;
      animation-delay: 0.15s;
    }

    .eq-bar:nth-child(3) {
      height: 8px;
      animation-delay: 0.3s;
    }

    .eq-bar:nth-child(4) {
      height: 14px;
      animation-delay: 0.1s;
    }

    /* ─── MISC COMPONENTS ─── */
    .card-playing-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: var(--accent);
      color: white;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      opacity: 0;
      transition: opacity var(--dur-normal);
    }

    .song-card.playing .card-playing-badge {
      opacity: 1;
    }

    .song-row-num {
      width: 24px;
      text-align: right;
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .song-row.playing .song-row-num {
      color: var(--accent);
    }

    .section-badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(255, 0, 64, .1);
      border: 1px solid rgba(255, 0, 64, .2);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 10px;
      vertical-align: middle;
    }

    .spin-loader {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 40px auto;
    }

    /* ════════════════════════════════════
       NOW PLAYING EXPANDED — Slide up from bottom
    ════════════════════════════════════ */
    #npExpanded {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 24px;
      display: none;
      overflow: hidden;
    }

    #npExpanded.open {
      display: flex;
      animation: expandedSlideUp 0.42s var(--ease-smooth) both;
    }

    #npExpanded.close {
      animation: expandedSlideDown 0.32s var(--ease-smooth) both;
    }

    /* Gradient background when expanded */
    #npExpanded::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center 30%, rgba(255, 0, 64, .12) 0%, transparent 70%);
      pointer-events: none;
    }

    #npExpanded .exp-thumb {
      width: min(280px, 80vw);
      height: min(280px, 80vw);
      border-radius: 16px;
      object-fit: cover;
      box-shadow: 0 32px 80px rgba(255, 0, 64, .3);
      animation: scaleIn 0.5s var(--ease-spring) 0.1s both;
      transition: transform var(--dur-normal) var(--ease-spring);
    }

    #npExpanded.open .exp-thumb:hover {
      transform: scale(1.03) rotate(-1deg);
    }

    #npExpanded .exp-info {
      text-align: center;
      animation: fadeInUp 0.4s var(--ease-out) 0.15s both;
    }

    #npExpanded .exp-title {
      font-family: var(--font-head);
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    #npExpanded .exp-artist {
      color: var(--muted);
      font-size: 14px;
    }

    #npExpanded .exp-progress {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeInUp 0.4s var(--ease-out) 0.2s both;
    }

    #npExpanded .exp-times {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    #npExpanded .exp-bar {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      transition: height var(--dur-fast);
    }

    #npExpanded .exp-bar:hover {
      height: 6px;
    }

    #npExpanded .exp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      pointer-events: none;
      transition: width 0.5s linear;
    }

    #npExpanded .exp-controls {
      display: flex;
      align-items: center;
      gap: 28px;
      animation: fadeInUp 0.4s var(--ease-out) 0.25s both;
    }

    #npExpanded .exp-ctrl {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 22px;
      padding: 8px;
      transition: color var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
    }

    #npExpanded .exp-ctrl:hover {
      color: var(--text);
      transform: scale(1.15);
    }

    #npExpanded .exp-ctrl:active {
      transform: scale(0.88);
    }

    #npExpanded .exp-ctrl.active {
      color: var(--accent);
    }

    #npExpanded .exp-play {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      border: none;
      font-size: 22px;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 8px 28px rgba(255, 0, 64, .45);
      transition: transform var(--dur-fast) var(--ease-spring),
        box-shadow var(--dur-normal);
    }

    #npExpanded .exp-play:hover {
      transform: scale(1.1);
      box-shadow: 0 12px 36px rgba(255, 0, 64, .6);
    }

    #npExpanded .exp-play:active {
      transform: scale(0.92);
    }

    #npExpanded .exp-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, .08);
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      padding: 10px;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      transition: background var(--dur-fast),
        color var(--dur-fast),
        transform var(--dur-fast) var(--ease-spring);
      animation: fadeIn 0.3s var(--ease-out) 0.3s both;
    }

    #npExpanded .exp-close:hover {
      background: rgba(255, 255, 255, .15);
      color: var(--text);
      transform: rotate(10deg) scale(1.1);
    }

    #npExpanded .exp-actions {
      display: flex;
      gap: 32px;
      animation: fadeInUp 0.4s var(--ease-out) 0.3s both;
    }

    #npExpanded .exp-action {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      transition: color var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
    }

    #npExpanded .exp-action i {
      font-size: 20px;
    }

    #npExpanded .exp-action:hover {
      color: var(--text);
      transform: translateY(-3px);
    }

    #npExpanded .exp-action:active {
      transform: scale(0.9);
    }

    #npExpanded .exp-action.active {
      color: var(--accent);
    }

    /* ════════════════════════════════════
       MOBILE STYLES
    ════════════════════════════════════ */
    @media (max-width: 768px) {
      :root {
        --player-h: 64px;
        --mob-nav-h: 60px;
      }

      body {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr var(--player-h) var(--mob-nav-h);
        grid-template-areas: "main" "player" "mobnav";
        overflow: hidden;
      }

      #sidebar {
        display: none;
      }

      /* Mobile player — horizontal layout */
      #player {
        grid-template-columns: auto 1fr auto auto auto auto auto;
        grid-template-areas: "thumb info . prev play next like";
        gap: 8px;
        padding: 0 12px;
        align-items: center;
      }

      #player .controls {
        display: none !important;
      }

      #player .right-ctrl {
        display: none !important;
      }

      #player .now-playing {
        grid-area: unset;
        display: contents;
      }

      .np-thumb {
        grid-area: thumb;
        width: 44px;
        height: 44px;
        border-radius: 6px;
      }

      .np-info-wrap {
        grid-area: info;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        overflow: hidden;
        cursor: pointer;
      }

      .np-info-wrap h4 {
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .np-info-wrap p {
        font-size: 11px;
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      #mobPrevBtn {
        grid-area: prev;
      }

      #mobPlayBtn {
        grid-area: play;
      }

      #mobNextBtn {
        grid-area: next;
      }

      #mobLikeBtn {
        grid-area: like;
      }

      .mob-ctrl-btn {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 18px;
        padding: 8px;
        transition: color var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
        display: flex;
        align-items: center;
      }

      .mob-ctrl-btn:hover {
        color: var(--text);
      }

      .mob-ctrl-btn:active {
        transform: scale(0.85);
      }

      #mobPlayBtn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--accent);
        color: white !important;
        border: none;
        display: grid;
        place-items: center;
        font-size: 15px;
        cursor: pointer;
        transition: transform var(--dur-fast) var(--ease-spring),
          box-shadow var(--dur-normal);
        flex-shrink: 0;
      }

      #mobPlayBtn:hover {
        transform: scale(1.1);
        box-shadow: 0 4px 16px rgba(255, 0, 64, .4);
      }

      #mobPlayBtn:active {
        transform: scale(0.88);
      }

      #mobLikeBtn.liked {
        color: var(--accent2) !important;
      }

      #mobLikeBtn:active {
        animation: likeHeart 0.4s var(--ease-spring) both;
      }

      .song-grid {
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      }

      .hero h2 {
        font-size: 24px;
      }

      #content {
        padding: 16px;
      }

      #topbar {
        padding: 10px 16px;
      }

      #topbar h1 {
        display: none;
      }

      #toast {
        bottom: calc(var(--player-h) + var(--mob-nav-h) + 8px);
        right: 12px;
        left: 12px;
        right: 12px;
        text-align: center;
      }

      #queuePanel {
        bottom: calc(var(--player-h) + var(--mob-nav-h));
      }

      /* Swipe hint on player */
      #player {
        cursor: pointer;
      }
    }

    /* ════════════════════════════════════
       MOBILE BOTTOM NAV
    ════════════════════════════════════ */
    #mobileNav {
      display: none;
      grid-area: mobnav;
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-direction: row;
      justify-content: space-around;
      align-items: center;
      z-index: 150;
    }

    .mob-nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 10px;
      font-family: var(--font-body);
      cursor: pointer;
      padding: 8px 16px;
      transition: color var(--dur-fast), transform var(--dur-fast) var(--ease-spring);
      position: relative;
    }

    .mob-nav-btn i {
      font-size: 18px;
      transition: transform var(--dur-fast) var(--ease-spring);
    }

    .mob-nav-btn:active {
      transform: scale(0.9);
    }

    .mob-nav-btn.active {
      color: var(--accent);
    }

    .mob-nav-btn.active i {
      transform: scale(1.15);
    }

    /* Active indicator dot */
    .mob-nav-btn.active::after {
      content: '';
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: scaleIn 0.2s var(--ease-spring) both;
    }

    @media (max-width: 768px) {
      #mobileNav {
        display: flex;
      }
    }

    /* ════════════════════════════════════
       MOBILE SWIPE GESTURE
    ════════════════════════════════════ */
    /* Pull-to-expand indicator on mobile player */
    #player::after {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 3px;
      border-radius: 2px;
      background: var(--border);
      display: none;
    }

    @media (max-width: 768px) {
      #player::after {
        display: block;
      }
    }
  </style>
</head>

<body>

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside id="sidebar">
    <div class="logo">
      <div class="logo-icon">🎵</div>
      <span>Mestify</span>
    </div>
    <nav>
      <div class="nav-label">Menu</div>
      <button class="nav-item active" data-view="home"><i class="fa-solid fa-house"></i> Home</button>
      <button class="nav-item" data-view="search"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
      <button class="nav-item" data-view="liked"><i class="fa-solid fa-heart"></i> Liked Songs</button>
      <button class="nav-item" data-view="queue"><i class="fa-solid fa-list-music"></i> Queue</button>
      <div class="nav-label" style="margin-top:8px">Genres</div>
    </nav>
    <div class="genre-pills">
      <button class="genre-pill active" data-genre="pop"><span class="dot"
